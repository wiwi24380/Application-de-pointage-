<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TICP Prm6 — Pointage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="header-left">
    <div class="logo">WP</div>
    <div>
      <div class="app-title">TICP Prm6 Pointage</div>
      <div class="app-subtitle">Suivi des ordres de fabrication</div>
    </div>
  </div>

  <div class="time-counter">
    <div class="counter-label">Heures restantes</div>
    <div class="counter-value neg" id="counter-display">7.75</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:100%;"></div>
    </div>
  </div>
</header>

<!-- ===== CONTENU PRINCIPAL ===== -->
<main>

  <!-- Nom + Date -->
  <div class="top-fields">
    <div class="field-group">
      <label for="field-nom">Nom</label>
      <input type="text" id="field-nom" placeholder="Votre nom…" autocomplete="name">
    </div>
    <div class="field-group">
      <label for="field-date">Date</label>
      <input type="date" id="field-date">
    </div>
  </div>

  <!-- Tableau des OF -->
  <div class="section-title">Ordres de fabrication</div>
  <div class="table-wrapper">

    <div class="table-header">
      <span>#</span>
      <span>OF</span>
      <span>Symbole</span>
      <span>Temps (h)</span>
    </div>

    <div id="rows-container">
      <!-- Les 10 lignes sont générées par app.js -->
    </div>

    <div class="table-footer">
      <span class="total-label">Total pointé</span>
      <span class="total-value" id="total-heures">0.00</span>
    </div>

  </div>

  <!-- Boutons d'action -->
  <div class="actions">

    <button class="btn btn-primary" onclick="envoyerOneDrive()">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Envoyer vers OneDrive
    </button>

    <button class="btn btn-secondary" onclick="sauvegarder()">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Sauvegarder
    </button>

    <button class="btn btn-danger" onclick="nouvelleJournee()">
      <svg class="icon" viewBox="0 0 24 24">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
      </svg>
      Nouvelle journée
    </button>

  </div>

</main>

<!-- Notification -->
<div id="toast"></div>

<!-- ===== SCRIPT ===== -->
<script src="app.js"></script>

</body>
</html>
